name: Portfolio checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: Project checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up backend Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "16"

      - name: Install backend Yarn Classic
        run: npm install -g yarn@1.22.22

      - name: Install backend dependencies
        working-directory: api-app
        run: yarn install --non-interactive --ignore-engines

      - name: Build backend
        working-directory: api-app
        run: yarn build

      - name: Set up frontend Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable frontend Corepack
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: booking-app
        run: yarn install --immutable

      - name: Build frontend
        working-directory: booking-app
        run: yarn build

      - name: Check for sensitive file names
        run: |
          if find . -type f \( -name '.env' -o -name '*.pem' -o -name '*.key' -o -name 'id_rsa' -o -name 'credentials' \) \
            -not -path './.git/*' \
            -not -path '*/node_modules/*' \
            -not -path '*/build/*' \
            -not -path '*/dist/*' | grep .; then
            echo "Sensitive file-like paths found."
            exit 1
          fi

      - name: Check for obvious committed secrets
        run: |
          if grep -RInE '(Wasser13!|rw0b73\.webhosting\.systems|yeta@qontrola\.com|AKIA[0-9A-Z]{16}|BEGIN (RSA )?PRIVATE KEY|mongodb://.*:.*@)' . \
            --exclude-dir=.git \
            --exclude-dir=.yarn \
            --exclude-dir=node_modules \
            --exclude-dir=build \
            --exclude-dir=dist \
            --exclude='*.md' \
            --exclude='.env.example' \
            --exclude='.pnp.*' \
            --exclude=portfolio-checks.yml; then
            echo "Potential secret or private infrastructure reference found."
            exit 1
          fi
