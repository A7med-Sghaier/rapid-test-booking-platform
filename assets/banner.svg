<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="260" viewBox="0 0 1000 260" role="img" aria-label="Rapid-Test Platform">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.55" stop-color="#141c2b"/>
      <stop offset="1" stop-color="#1b2436"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e6f6f4"/>
      <stop offset="1" stop-color="#bfe9ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.84" cy="0.16" r="0.62">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.1" cy="0.95" r="0.5">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <style>
      .n    { font-family:'Segoe UI',Helvetica,Arial,sans-serif; font-weight:700; }
      .t    { font-family:'Segoe UI',Helvetica,Arial,sans-serif; font-weight:600; }
      .m    { font-family:'Segoe UI',Helvetica,Arial,sans-serif; font-weight:400; }
      .mono { font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace; }
    </style>
  </defs>

  <rect width="1000" height="260" rx="16" fill="url(#bg)"/>
  <rect width="1000" height="260" rx="16" fill="url(#glow)"/>
  <rect width="1000" height="260" rx="16" fill="url(#glow2)"/>
  <rect x="0" y="0" width="6" height="260" rx="3" fill="url(#accent)"/>

  <g fill="#ffffff" opacity="0.05">
    <circle cx="700" cy="42" r="2"/><circle cx="740" cy="42" r="2"/><circle cx="780" cy="42" r="2"/><circle cx="820" cy="42" r="2"/><circle cx="860" cy="42" r="2"/><circle cx="900" cy="42" r="2"/><circle cx="940" cy="42" r="2"/>
    <circle cx="700" cy="72" r="2"/><circle cx="740" cy="72" r="2"/><circle cx="780" cy="72" r="2"/><circle cx="820" cy="72" r="2"/><circle cx="860" cy="72" r="2"/><circle cx="900" cy="72" r="2"/><circle cx="940" cy="72" r="2"/>
    <circle cx="700" cy="102" r="2"/><circle cx="740" cy="102" r="2"/><circle cx="780" cy="102" r="2"/><circle cx="820" cy="102" r="2"/><circle cx="860" cy="102" r="2"/><circle cx="900" cy="102" r="2"/><circle cx="940" cy="102" r="2"/>
  </g>

  <g transform="translate(56,54)">
    <rect x="0" y="-13" width="9" height="9" rx="2" transform="rotate(45 4.5 -8.5)" fill="url(#accent)"/>
    <text class="mono" x="22" y="-5" font-size="13" letter-spacing="3" fill="#7dd3c8">END-TO-END BOOKING &amp; OPERATIONS</text>
  </g>

  <text class="n" x="54" y="128" font-size="58" fill="url(#title)">Rapid-Test Platform</text>

  <text class="m" x="56" y="164" font-size="16" fill="#aeb9cc">Appointment booking &amp; operations for COVID-19 rapid-test centers.</text>

  <g transform="translate(56,196)" class="t" font-size="13">
    <g>
      <rect x="0" y="0" width="85" height="28" rx="14" fill="#1f2a3d" stroke="#2f3d55"/><rect x="95" y="0" width="100" height="28" rx="14" fill="#1f2a3d" stroke="#2f3d55"/><rect x="205" y="0" width="71" height="28" rx="14" fill="#1f2a3d" stroke="#2f3d55"/><rect x="286" y="0" width="78" height="28" rx="14" fill="#1f2a3d" stroke="#2f3d55"/><rect x="374" y="0" width="71" height="28" rx="14" fill="#1f2a3d" stroke="#2f3d55"/>
    </g>
    <text x="42" y="19" text-anchor="middle" fill="#8fd6cf">React 18</text><text x="145" y="19" text-anchor="middle" fill="#8fd6cf">TypeScript</text><text x="240" y="19" text-anchor="middle" fill="#8fd6cf">NestJS</text><text x="325" y="19" text-anchor="middle" fill="#8fd6cf">MongoDB</text><text x="409" y="19" text-anchor="middle" fill="#8fd6cf">Docker</text>
  </g>

  <g transform="translate(720,120)" opacity="0.96">
    <rect x="0" y="0" width="230" height="112" rx="10" fill="#0b1220" stroke="#243149"/>
    <rect x="0" y="0" width="230" height="26" rx="10" fill="#111a2b"/>
    <rect x="0" y="16" width="230" height="10" fill="#111a2b"/>
    <circle cx="16" cy="13" r="3.5" fill="#ff5f56"/>
    <circle cx="30" cy="13" r="3.5" fill="#ffbd2e"/>
    <circle cx="44" cy="13" r="3.5" fill="#27c93f"/>
    <g>
      <text x="16" y="52" fill="#7dd3c8" class="mono" font-size="11">book()  -&gt;  check-in</text>
      <text x="16" y="72" fill="#f0b45f" class="mono" font-size="11">QR + PDF certificate</text>
      <text x="16" y="92" fill="#79c0ff" class="mono" font-size="11">realtime queue</text>
    </g>
  </g>
</svg>
